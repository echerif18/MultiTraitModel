defaults:
  - transferability
  - _self_

project:
  name: "study1-transferability-1721"
  seed: 42

data:
  data_path: "data/processed/DB_50_Meta_EC_with_locations_clean1721.csv"
  use_wavelength_range: true
  spectra_wl_start: 400
  spectra_wl_end: 2450
  n_spectra_bands: 1721
  n_traits: 20
  trait_names:
    - "Anth_area_ug_cm2"
    - "Boron_area_mg_cm2"
    - "C_area_mg_cm2"
    - "Ca_area_mg_cm2"
    - "Car_area_ug_cm2"
    - "Cellulose_mg_cm2"
    - "Chl_area_ug_cm2"
    - "Cu_area_mg_cm2"
    - "EWT_mg_cm2"
    - "Fiber_mg_cm2"
    - "LAI_m2_m2"
    - "LMA_g_m2"
    - "Lignin_mg_cm2"
    - "Mg_area_mg_cm2"
    - "Mn_area_mg_cm2"
    - "NSC_mg_cm2"
    - "N_area_mg_cm2"
    - "P_area_mg_cm2"
    - "Potassium_area_mg_cm2"
    - "S_area_mg_cm2"
  transferability:
    enabled: true
    source_domain_col: "dataset"
    target_domain: "target_site"
    run_all_domains: true
    val_fraction: 0.2

model:
  name: "efficientnet1d_b0"
  input_length: 1721
  n_outputs: 20
  dropout_rate: 0.2
  drop_connect_rate: 0.2

training:
  epochs: 200
  batch_size: 64
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 5
  patience: 30
  mixed_precision: true
  use_sample_weights: true
  loss:
    name: "huber"
    delta: 1.0

logging:
  wandb:
    enabled: true
    project: "plant-trait-retrieval"
    tags: ["study1", "transferability", "efficientnet-b0", "1721"]
