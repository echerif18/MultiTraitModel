defaults:
  - base
  - _self_

project:
  name: "study1-shap-eval"
  seed: 42

# Required: path to trained model checkpoint
checkpoint: null

# Optional: folder containing spectra_scaler.pkl
scalers_dir: null

data:
  data_path: "data/processed/DB_50_Meta_EC_with_locations_clean1721.csv"
  use_wavelength_range: true
  spectra_wl_start: 400
  spectra_wl_end: 2450
  n_spectra_bands: 1721
  n_traits: 20
  trait_names:
    - "Anth_area_ug_cm2"
    - "Boron_area_mg_cm2"
    - "C_area_mg_cm2"
    - "Ca_area_mg_cm2"
    - "Car_area_ug_cm2"
    - "Cellulose_mg_cm2"
    - "Chl_area_ug_cm2"
    - "Cu_area_mg_cm2"
    - "EWT_mg_cm2"
    - "Fiber_mg_cm2"
    - "LAI_m2_m2"
    - "LMA_g_m2"
    - "Lignin_mg_cm2"
    - "Mg_area_mg_cm2"
    - "Mn_area_mg_cm2"
    - "NSC_mg_cm2"
    - "N_area_mg_cm2"
    - "P_area_mg_cm2"
    - "Potassium_area_mg_cm2"
    - "S_area_mg_cm2"

model:
  name: "efficientnet1d_b0"
  in_channels: 1
  input_length: 1721
  n_outputs: 20
  width_coefficient: 1.0
  depth_coefficient: 1.0
  dropout_rate: 0.2
  drop_connect_rate: 0.2

shap:
  output_dir: "results/experiments/shap_eval"
  background_size: 256
  eval_size: 512
  n_samples: 200
  trait_indices: []  # empty = all traits
