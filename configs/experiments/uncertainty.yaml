defaults:
  - /base
  - _self_

experiment:
  stage: "all"                  # all | transfer | distance
  output_dir: "results/experiments/uncertainty"
  base_model: "efficientnet1d_b0"   # efficientnet1d_b0 | single_cnn1d | plsr
  plsr_components: 30
  transfer:
    domain_col: "dataset"
    run_all_domains: true
    target_domain: "target_site"
    calibration_fraction: 0.2
  distance:
    n_neighbors: 50
    quantile: 0.5
    normalize_vectors: true
    normalize_by_train: true
    use_average: false
    gpu: 0
    require_faiss: true
    embedding_batch_size: 512
  disun:
    predictor_subset:
      - "qu50_dist_EmbLCos_nor"
      - "qu50_dist_SpCos_nor"
    quantile: 0.95
    alpha: 0.0
    transform_x: true
    transform_y: true
    x_transform_method: yeo-johnson
    y_transform_method: yeo-johnson

logging:
  wandb:
    enabled: false
